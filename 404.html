<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting…</title>
    <script>
      (function () {
        const repoBase = '/home-recipes';
        const path = window.location.pathname.replace(/\/404\.html$/i, '');
        const search = window.location.search || '';
        const hash = window.location.hash || '';
        const redirectPath = `${path}${search}${hash}`;

        if (redirectPath && redirectPath !== repoBase + '/') {
          window.location.replace(`${repoBase}/?p=${encodeURIComponent(redirectPath)}`);
        } else {
          window.location.replace(`${repoBase}/`);
        }
      })();
    </script>
  </head>
  <body></body>
</html>
